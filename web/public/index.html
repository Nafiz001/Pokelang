<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokemonLang Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>PokemonLang Studio</h1>
        <p>Write PokemonLang code, run it locally, and see output instantly.</p>
      </header>

      <section class="panel">
        <div class="toolbar">
          <button id="loadHello" type="button">Load Hello World</button>
          <button id="loadSimple" type="button">Load Simple Demo</button>
          <button id="loadIfElse" type="button">Load If/Else Demo</button>
          <button id="loadFunctionLoop" type="button">Load Function + Loop Demo</button>
          <button id="loadCountTen" type="button">Load Count 1-10 Demo</button>
          <button id="formatIndent" type="button">Format Indentation</button>
          <button id="clearEditor" type="button">Clear</button>
          <button id="runBtn" type="button" class="run">Run Code</button>
          <button id="traceBtn" type="button" class="run trace">Run with Trace</button>
        </div>

        <p class="hint">Use <strong>Run with Trace</strong> to view: token stream -> grammar reductions -> semantic actions -> IR lines.</p>

        <label for="editor">Editor</label>
        <textarea id="editor" spellcheck="false"></textarea>
      </section>

      <section class="panel">
        <label for="output">Output</label>
        <pre id="output">Ready.</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
